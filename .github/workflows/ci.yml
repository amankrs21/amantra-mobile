name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Lint, Type-check & SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx expo lint

      - name: Type-check
        run: npx tsc --noEmit
        if: hashFiles('tsconfig.json') != ''

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Build & Deploy (EAS)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (production)
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_WEATHER_API_KEY: ${{ secrets.EXPO_PUBLIC_WEATHER_API_KEY }}

      - name: Get APK URL from EAS
        id: apk_url
        run: |
          APK_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['artifacts']['buildUrl'])")
          echo "url=$APK_URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: curl -L -o amantra.apk "${{ steps.apk_url.outputs.url }}"

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: Amantra v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            🚀 **Amantra** Android build from merge to `main`.

            **Commit:** ${{ github.sha }}
            **Built by:** EAS Build + GitHub Actions
          files: amantra.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
